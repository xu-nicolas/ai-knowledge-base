name: Daily AI Knowledge Collection

# 每天 UTC 00:00（北京时间 08:00）自动采集
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collection pipeline (Steps 1-2, free)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python pipeline/pipeline.py \
            --sources github,rss \
            --limit 20 \
            --verbose

      - name: Validate collected data
        run: |
          if ls knowledge/entries/*.json 1>/dev/null 2>&1; then
            python hooks/validate_json.py knowledge/entries/*.json
            python hooks/check_quality.py knowledge/entries/*.json
          else
            echo "No entries to validate"
          fi

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add knowledge/
          if git diff --staged --quiet; then
            echo "No new data to commit"
          else
            COUNT=$(git diff --staged --name-only | wc -l)
            git commit -m "chore: daily collection - ${COUNT} files [$(date -u +%Y-%m-%d)]"
            git push
          fi
