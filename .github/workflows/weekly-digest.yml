name: Weekly Knowledge Digest

# 每周日 UTC 02:00（北京时间 10:00）自动生成知识摘要
on:
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AI analysis (Steps 3-4)
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          python pipeline/pipeline.py \
            --sources github,rss \
            --limit 20 \
            --verbose

      - name: Commit analysis results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add knowledge/
          if git diff --staged --quiet; then
            echo "No new analysis results to commit"
          else
            COUNT=$(git diff --staged --name-only | wc -l)
            git commit -m "chore: weekly digest - ${COUNT} files [$(date -u +%Y-W%V)]"
            git push
          fi
